<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | VoiceSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sky:    #4A9FD4;
      --sky-l:  #7BBEE5;
      --sky-ll: #D6EDFA;
      --sky-bg: #EBF6FC;
      --mint:   #3DAA7A;
      --mint-ll:#D2F0E4;
      --mint-bg:#EBF7F2;
      --peach:  #F5845C;
      --ink:    #1E3A4A;
      --ink-70: rgba(30,58,74,0.7);
      --ink-40: rgba(30,58,74,0.4);
      --ink-12: rgba(30,58,74,0.12);
      --white:  #FFFFFF;
      --bg:     #F6FAFE;
      --r:      14px;
      --r-lg:   22px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ===== NAV ===== */
    nav {
      height: 66px; padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(246,250,254,0.95);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(30,58,74,0.06);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--ink);
    }
    .nav-logo-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 3px 10px rgba(74,159,212,0.35);
    }
    .nav-back {
      font-size: 0.82rem; color: var(--ink-70); text-decoration: none;
      display: flex; align-items: center; gap: 6px; transition: color 0.2s;
    }
    .nav-back:hover { color: var(--sky); }

    /* ===== MAIN ===== */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .login-wrap {
      width: 100%; max-width: 440px;
    }

    /* Logo / heading */
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-logo-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 16px;
      box-shadow: 0 8px 24px rgba(74,159,212,0.3);
    }
    .login-header h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.6rem; font-weight: 700; color: var(--ink);
      margin-bottom: 6px;
    }
    .login-header p { font-size: 0.85rem; color: var(--ink-70); }

    /* Tabs */
    .tab-wrap {
      display: flex; background: var(--sky-bg);
      border: 1.5px solid var(--sky-ll);
      border-radius: 12px; padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1; padding: 9px;
      border: none; border-radius: 9px;
      background: transparent; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem; font-weight: 500; color: var(--ink-70);
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--white);
      color: var(--sky); font-weight: 700;
      box-shadow: 0 2px 8px rgba(74,159,212,0.12);
    }

    /* Card */
    .login-card {
      background: var(--white);
      border: 1.5px solid var(--sky-ll);
      border-radius: var(--r-lg);
      padding: 32px;
      box-shadow: 0 8px 32px rgba(74,159,212,0.09);
    }

    /* Form */
    .form-group { margin-bottom: 18px; }
    label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: var(--ink); margin-bottom: 7px; letter-spacing: 0.02em;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--sky-ll);
      border-radius: var(--r);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem; color: var(--ink);
      background: var(--white);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(74,159,212,0.15);
    }
    input::placeholder { color: var(--ink-40); }

    /* Submit button */
    .btn-submit {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      border: none; border-radius: var(--r);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.9rem; font-weight: 700; color: var(--white);
      cursor: pointer; transition: all 0.22s;
      box-shadow: 0 4px 16px rgba(74,159,212,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 8px;
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(74,159,212,0.4); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--ink-40); font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--sky-ll);
    }

    /* Magic link button */
    .btn-magic {
      width: 100%; padding: 12px;
      background: var(--sky-bg);
      border: 1.5px solid var(--sky-ll); border-radius: var(--r);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.85rem; font-weight: 500; color: var(--sky);
      cursor: pointer; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-magic:hover { background: var(--sky-ll); }
    .btn-magic:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Alert */
    .alert {
      padding: 12px 16px; border-radius: var(--r);
      font-size: 0.82rem; margin-bottom: 16px;
      display: none; align-items: flex-start; gap: 10px;
    }
    .alert.error {
      display: flex;
      background: #FFF0EE; border: 1px solid #FDDDD3; color: #C04030;
    }
    .alert.success {
      display: flex;
      background: var(--mint-bg); border: 1px solid var(--mint-ll); color: #2a7a55;
    }
    .alert-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer note */
    .login-footer-note {
      text-align: center; margin-top: 24px;
      font-size: 0.75rem; color: var(--ink-40);
    }
    .login-footer-note a { color: var(--sky); text-decoration: none; }

    /* ===== FOOTER ===== */
    footer {
      background: var(--ink); padding: 28px 48px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .footer-logo {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
      font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 700;
      color: rgba(255,255,255,0.5);
    }
    .footer-logo-mark {
      width: 26px; height: 26px; border-radius: 7px;
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      display: flex; align-items: center; justify-content: center; font-size: 0.85rem;
    }
    .footer-copy { font-size: 0.7rem; color: rgba(255,255,255,0.2); }

    @media (max-width: 600px) {
      nav { padding: 0 20px; }
      .login-card { padding: 24px 20px; }
      footer { padding: 24px 20px; flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-logo-icon">🎙</div>
    VoiceSync
  </a>
  <a href="index.html" class="nav-back">← トップに戻る</a>
</nav>

<main>
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-logo-icon">🎙</div>
      <h1>VoiceSync</h1>
      <p>アカウントにログインして、すべての機能をご利用ください。</p>
    </div>

    <div class="tab-wrap" id="tab-wrap">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ログイン</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">新規登録</button>
    </div>

    <!-- Already logged in state -->
    <div id="already-logged-in" style="display:none;margin-bottom:20px;">
      <div style="background:var(--mint-bg);border:1.5px solid var(--mint-ll);border-radius:var(--r-lg);padding:28px 24px;text-align:center;">
        <div style="font-size:2rem;margin-bottom:12px;">✅</div>
        <p style="font-size:0.85rem;color:var(--mint);font-weight:700;margin-bottom:6px;">ログイン済みです</p>
        <p id="already-email" style="font-size:0.82rem;color:var(--ink-70);margin-bottom:20px;"></p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <a href="index.html" style="background:linear-gradient(135deg,var(--sky),#2d85b8);color:var(--white);font-size:0.82rem;font-weight:700;padding:10px 22px;border-radius:30px;text-decoration:none;box-shadow:0 4px 14px rgba(74,159,212,0.3);">🏠 トップへ戻る</a>
          <button onclick="handleLogout()" style="background:var(--white);border:1.5px solid #FDDDD3;color:var(--peach);font-size:0.82rem;font-weight:500;padding:10px 22px;border-radius:30px;cursor:pointer;">ログアウト</button>
        </div>
      </div>
    </div>

    <div id="login-forms"><div class="login-card">
      <!-- Alert -->
      <div class="alert" id="alert-box">
        <span class="alert-icon" id="alert-icon"></span>
        <span id="alert-msg"></span>
      </div>

      <!-- Login form -->
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">メールアドレス</label>
          <input type="email" id="login-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">パスワード</label>
          <input type="password" id="login-password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn-submit" id="btn-login">
          <span id="btn-login-label">ログイン</span>
        </button>
      </form>

      <!-- Signup form -->
      <form id="form-signup" onsubmit="handleSignup(event)" style="display:none">
        <div class="form-group">
          <label for="signup-email">メールアドレス</label>
          <input type="email" id="signup-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="signup-password">パスワード（6文字以上）</label>
          <input type="password" id="signup-password" placeholder="••••••••" required minlength="6">
        </div>
        <button type="submit" class="btn-submit" id="btn-signup">
          <span id="btn-signup-label">アカウントを作成</span>
        </button>
      </form>

      <div id="magic-section"><div class="divider">または</div>

      <button class="btn-magic" id="btn-magic" onclick="handleMagicLink()">
        ✉️ マジックリンクでログイン（メール送信）
      </button>
    </div></div></div>

    <p class="login-footer-note">
      ログインすることで、<a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意したものとみなします。
    </p>
  </div>
</main>

<footer>
  <a href="index.html" class="footer-logo">
    <div class="footer-logo-mark">🎙</div>
    VoiceSync
  </a>
  <span class="footer-copy">© 2026 VoiceSync</span>
</footer>

<script>
  const SUPABASE_URL = 'https://juwkgkdhzlywcgaxyedc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_v8WVOejfUy21WQM1kksxBQ_94lagLtS';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // ログイン済みチェック — 即リダイレクトせず「ログイン済み」UIを表示
  sb.auth.getSession().then(({ data }) => {
    if (data.session) showLoggedInState(data.session.user);
  });
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) showLoggedInState(session.user);
    if (event === 'SIGNED_OUT') hideLoggedInState();
  });

  function showLoggedInState(user) {
    document.getElementById('already-logged-in').style.display = 'block';
    document.getElementById('already-email').textContent = user.email;
    document.getElementById('tab-wrap').style.display = 'none';
    document.getElementById('login-forms').style.display = 'none';
    document.getElementById('magic-section').style.display = 'none';
  }
  function hideLoggedInState() {
    document.getElementById('already-logged-in').style.display = 'none';
    document.getElementById('tab-wrap').style.display = '';
    document.getElementById('login-forms').style.display = '';
    document.getElementById('magic-section').style.display = '';
  }

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-signup').classList.toggle('active', !isLogin);
    document.getElementById('form-login').style.display = isLogin ? '' : 'none';
    document.getElementById('form-signup').style.display = isLogin ? 'none' : '';
    clearAlert();
  }

  function showAlert(type, msg) {
    const box = document.getElementById('alert-box');
    const icon = document.getElementById('alert-icon');
    const text = document.getElementById('alert-msg');
    box.className = 'alert ' + type;
    icon.textContent = type === 'error' ? '⚠️' : '✅';
    text.textContent = msg;
  }
  function clearAlert() {
    document.getElementById('alert-box').className = 'alert';
  }

  function setLoading(btnId, labelId, loading, defaultLabel) {
    const btn = document.getElementById(btnId);
    const lbl = document.getElementById(labelId);
    btn.disabled = loading;
    lbl.innerHTML = loading
      ? '<span class="spinner"></span>'
      : defaultLabel;
  }

  async function handleLogin(e) {
    e.preventDefault();
    clearAlert();
    setLoading('btn-login', 'btn-login-label', true);
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading('btn-login', 'btn-login-label', false, 'ログイン');
    if (error) {
      showAlert('error', 'ログインに失敗しました。メールアドレスとパスワードをご確認ください。');
    } else {
      window.location.href = 'index.html';
    }
  }

  async function handleLogout() {
    await sb.auth.signOut();
  }

  async function handleSignup(e) {
    e.preventDefault();
    clearAlert();
    setLoading('btn-signup', 'btn-signup-label', true);
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const { error } = await sb.auth.signUp({ email, password });
    setLoading('btn-signup', 'btn-signup-label', false, 'アカウントを作成');
    if (error) {
      showAlert('error', error.message || '登録に失敗しました。');
    } else {
      showAlert('success', '確認メールを送信しました。メールに記載のリンクをクリックしてください。');
    }
  }

  async function handleMagicLink() {
    clearAlert();
    const emailEl = document.getElementById('login-email');
    const email = emailEl.value || document.getElementById('signup-email').value;
    if (!email) {
      showAlert('error', 'メールアドレスを入力してください。');
      emailEl.focus();
      return;
    }
    const btn = document.getElementById('btn-magic');
    btn.disabled = true;
    btn.textContent = '送信中...';
    const { error } = await sb.auth.signInWithOtp({ email });
    btn.disabled = false;
    btn.textContent = '✉️ マジックリンクでログイン（メール送信）';
    if (error) {
      showAlert('error', '送信に失敗しました: ' + error.message);
    } else {
      showAlert('success', `${email} にログインリンクを送信しました。メールをご確認ください。`);
    }
  }
</script>
</body>
</html>
